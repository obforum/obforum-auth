<!DOCTYPE html>
<html>
<head><title>Connecting...</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:60px;color:#333;font-size:18px">
  ✓ Connected! You can close this tab and return to the tool.
</p>
<script>
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.replace('#', '?'));
    const token = p.get('access_token');
    if (token) {
      sessionStorage.setItem('gtoken', token);
      if (window.opener) {
        window.opener.postMessage({ type: 'google_token', token }, '*');
      }
      setTimeout(() => window.close(), 1000);
    }
  }
</script>
</body>
</html>
