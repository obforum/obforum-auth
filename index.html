<!DOCTYPE html>
<html>
<head>
  <title>Connected!</title>
  <style>
    body { font-family: Inter, sans-serif; background: #00092A; color: #fff;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; }
    .box { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
           border-radius: 12px; padding: 32px 40px; text-align: center; max-width: 460px; width: 90%; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 20px; color: #BBBBBB; font-size: 14px; line-height: 1.6; }
    .token { background: #000; border: 1px solid rgba(255,218,0,0.4); border-radius: 8px;
             padding: 12px; font-size: 11px; word-break: break-all; color: #FFDA00;
             cursor: pointer; text-align: left; margin-bottom: 12px; }
    button { background: #FFDA00; color: #000; border: none; border-radius: 8px;
             padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
<div class="box">
  <div id="content">
    <h2>⏳ Loading...</h2>
  </div>
</div>
<script>
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.replace('#', '?'));
    const token = p.get('access_token');
    if (token) {
      // Try postMessage but don't rely on it
      if (window.opener) {
        try { window.opener.postMessage({ type: 'google_token', token }, '*'); } catch(e) {}
      }
      document.getElementById('content').innerHTML =
        '<h2>✓ Connected!</h2>' +
        '<p>Copy the token below and paste it into the tool, then close this tab.</p>' +
        '<div class="token" onclick="copyToken(this)">' + token + '</div>' +
        '<button onclick="copyToken(document.querySelector(\'.token\'))">Copy token</button>';
    }
  } else {
    document.getElementById('content').innerHTML =
      '<h2>❌ No token found</h2><p>Close this tab and try again.</p>';
  }

  function copyToken(el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      document.querySelector('button').textContent = '✓ Copied! Now paste into the tool';
    });
  }
</script>
</body>
</html>
